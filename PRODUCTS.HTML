<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products - KIZACK ELECTRICALS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ================= HEADER ================= -->
<header>
    <h1>KIZACK ELECTRICALS</h1>

    <!-- Cart Icon -->
    <div class="cart-icon" onclick="toggleCart()">
        🛒 <span id="cart-count">0</span>
    </div>
</header>

<!-- ================= PRODUCTS ================= -->
<section class="section">
    <h2 style="text-align:center;">Our Products</h2>

    <div class="grid">

        <div class="card">
            <img src="cctv.webp" alt="CCTV Camera" class="product-img">
            <h3>CCTV Camera</h3>
            <p>KSh 4500</p>
            <button onclick="addToCart('CCTV Camera', 4500)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="led-bulb.jpg" alt="LED Bulb" class="product-img">
            <h3>LED Bulb</h3>
            <p>KSh 300</p>
            <button onclick="addToCart('LED Bulb', 300)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="image_6a32fd49.png" alt="Solar CCTV Camera" class="product-img">
            <h3>4G Triple Lens Solar CCTV Camera</h3>
            <p>KSh 16,000</p>
            <button onclick="addToCart('4G Triple Lens Solar CCTV Camera', 16000)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="hikvision-camera.jpg" alt="Hikvision Camera" class="product-img">
            <h3>Hikvision DS-2CE56DOT-IR</h3>
            <p>KSh 3,499</p>
            <button onclick="addToCart('Hikvision DS-2CE56DOT-IR', 3499)">Add to Cart</button>
        </div>

        <div class="card">
            <img src="led-bulb.jpg" alt="LED Bulb" class="product-img">
            <h3>LED Bulb</h3>
            <p>KSh 300</p>
            <button onclick="addToCart('LED Bulb', 300)">Add to Cart</button>
        </div>

    </div>
</section>

<!-- ================= CART PANEL ================= -->
<div id="cart-panel" class="cart-panel">
    <h2>Your Cart</h2>
    <ul id="cart-items"></ul>
    <h3>Total: KSh <span id="cart-total">0</span></h3>
    <button onclick="checkout()">Checkout</button>
</div>

<!-- ================= JS ================= -->
<script defer src="script.js"></script>
 <button onclick="goToCheckout()">Checkout</button>

</body>
</html>
